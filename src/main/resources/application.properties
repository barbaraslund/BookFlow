spring.application.name=BookFlow

# H2 in-memory database connection
spring.datasource.url=jdbc:h2:mem:bookflow
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Make sure schema.sql and data.sql actually run on startup
spring.sql.init.mode=always

# Optional: web-based console to inspect the DB manually, at /h2-console
spring.h2.console.enabled=true
